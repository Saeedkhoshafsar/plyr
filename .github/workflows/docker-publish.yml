# ============================================================
# Build the Docker image and publish it to GitHub Container
# Registry (ghcr.io) on every push to main (and on tags).
#
# The published image can then be deployed on Coolify using the
# "Docker Image" resource type — no build step on the server.
#
# Image name:
#   ghcr.io/<owner>/<repo>:latest      (always points at main)
#   ghcr.io/<owner>/<repo>:<sha>       (one tag per commit)
#   ghcr.io/<owner>/<repo>:vX.Y.Z      (when you push a git tag)
#
# For this repo that resolves to:
#   ghcr.io/saeedkhoshafsar/plyr:latest
#
# No secrets to configure — GITHUB_TOKEN is provided automatically.
# After the first successful run, make the package public:
#   GitHub → your profile → Packages → plyr → Package settings →
#   Change visibility → Public   (so Coolify can pull without a login)
# ============================================================
name: Build & Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lower-case the image name (ghcr.io requires lowercase owner/repo).
      - name: Compute lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Image published";
            echo "";
            echo '```';
            echo "${{ steps.meta.outputs.tags }}";
            echo '```';
            echo "";
            echo "Deploy on Coolify with the **Docker Image** type using:";
            echo "\`${{ steps.img.outputs.name }}:latest\`";
          } >> "$GITHUB_STEP_SUMMARY"
